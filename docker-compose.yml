version: '3.9'

services:
  postgres:
    image: postgis/postgis:15-3.4-alpine
    container_name: ares_postgres
    environment:
      POSTGRES_DB:       ares_db
      POSTGRES_USER:     ares
      POSTGRES_PASSWORD: ares_secret
    ports:
      - "5432:5432"
    volumes:
      - ares_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ares -d ares_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ares_backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://ares:ares_secret@postgres:5432/ares_db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend  # hot reload in dev — mount as package subdir
      - ./backend/data:/app/backend/data
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ares_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src  # hot reload
    environment:
      - VITE_CESIUM_ION_TOKEN=${VITE_CESIUM_ION_TOKEN}
      - VITE_WS_URL=ws://localhost:8000/ws/events
    command: npm run dev -- --host 0.0.0.0
    restart: unless-stopped

volumes:
  ares_pgdata:
